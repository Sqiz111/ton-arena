services:
  postgres:
    image: postgres:16-alpine
    container_name: ton-arena-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: tonarena
      POSTGRES_PASSWORD: tonarena
      POSTGRES_DB: tonarena
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tonarena -d tonarena']
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    container_name: ton-arena-app
    restart: unless-stopped
    profiles: ['full'] # `docker compose --profile full up` — полный стек
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production # must win over NODE_ENV=development in .env
      DATABASE_URL: postgresql://tonarena:tonarena@postgres:5432/tonarena?connection_limit=10
    env_file:
      - .env
    ports:
      - '3000:3000'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
